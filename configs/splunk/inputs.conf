# Splunk Universal Forwarder — inputs.conf
# Deploy to: C:\Program Files\SplunkUniversalForwarder\etc\system\local\inputs.conf
# on each Windows victim VM.
#
# After editing, restart the forwarder:
#   Restart-Service SplunkForwarder

# ─── Sysmon Operational Log ─────────────────────────────────────────────────
[WinEventLog://Microsoft-Windows-Sysmon/Operational]
disabled = false
index = sysmon
sourcetype = XmlWinEventLog:Microsoft-Windows-Sysmon/Operational
renderXml = true
checkpointInterval = 5

# ─── Windows Security Log ───────────────────────────────────────────────────
[WinEventLog://Security]
disabled = false
index = wineventlog
sourcetype = WinEventLog:Security
# Focus on high-value event IDs to reduce volume
whitelist = 4624,4625,4627,4648,4656,4663,4670,4672,4688,4698,4700,4702,4720,4722,4724,4726,4732,4738,4740,4756,4768,4769,4771,4776

# ─── Windows System Log ─────────────────────────────────────────────────────
[WinEventLog://System]
disabled = false
index = wineventlog
sourcetype = WinEventLog:System

# ─── Windows Application Log ────────────────────────────────────────────────
[WinEventLog://Application]
disabled = false
index = wineventlog
sourcetype = WinEventLog:Application

# ─── PowerShell Script Block Logging ────────────────────────────────────────
[WinEventLog://Microsoft-Windows-PowerShell/Operational]
disabled = false
index = wineventlog
sourcetype = XmlWinEventLog:Microsoft-Windows-PowerShell/Operational
renderXml = true

# ─── Windows Defender ───────────────────────────────────────────────────────
[WinEventLog://Microsoft-Windows-Windows Defender/Operational]
disabled = false
index = wineventlog
sourcetype = XmlWinEventLog:Microsoft-Windows-Windows Defender/Operational
renderXml = true

# ─── Task Scheduler (persistence detection) ─────────────────────────────────
[WinEventLog://Microsoft-Windows-TaskScheduler/Operational]
disabled = false
index = wineventlog
sourcetype = XmlWinEventLog:Microsoft-Windows-TaskScheduler/Operational
renderXml = true
